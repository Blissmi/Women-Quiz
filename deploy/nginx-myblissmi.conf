# Nginx config for myblissmi.com -> /women-event
server {
  listen 80;
  server_name myblissmi.com;

  # Redirect root to /women-event
  location = / {
    return 302 /womenevent;
  }

  # Serve the app mounted at /women-event
  location /womenevent/ {
    # Strip the /women-event prefix and proxy to the backend root so
    # requests to /womenevent/api/... reach the server as /api/...
    proxy_pass http://127.0.0.1:4000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  # Proxy API calls to backend helper server
  location /api/ {
    proxy_pass http://127.0.0.1:4000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
